<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint List Generator — Nexus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --green: #00ff41;
      --green-dim: rgba(0,255,65,0.08);
      --green-mid: rgba(0,255,65,0.35);
      --text: #d8d8d8;
      --muted: #555;
      --muted2: #777;
      --red: #ff4040;
      --blue: #7ea7ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    header h1 { font-size: 13px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
    header span { font-size: 12px; color: var(--muted); }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 450px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left-panel {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .left-panel::-webkit-scrollbar { width: 3px; }
    .left-panel::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* Global date bar */
    .global-bar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .global-bar .flabel { font-size: 10px; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .global-bar input[type="date"] { flex: 1; }
    .global-date-fr { font-size: 11px; color: var(--muted2); white-space: nowrap; }

    /* PROJECT CARD */
    .project-card { border-bottom: 1px solid var(--border); }

    .project-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 18px;
      cursor: pointer;
      user-select: none;
      background: var(--surface);
      transition: background 0.12s;
    }
    .project-header:hover { background: var(--surface2); }

    .ph-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .proj-num { font-size: 10px; color: var(--green); letter-spacing: 1px; flex-shrink: 0; }
    .proj-name-tag { font-size: 12px; color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ph-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .caret { font-size: 9px; color: var(--muted); }

    .btn-del-proj {
      background: none;
      border: 1px solid var(--border2);
      color: var(--red);
      width: 22px; height: 22px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      transition: background 0.12s;
    }
    .btn-del-proj:hover { background: rgba(255,64,64,0.12); }

    /* Project body */
    .project-body {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      background: #0c0c0c;
    }

    /* Form */
    .field { display: flex; flex-direction: column; gap: 4px; }
    .flabel { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="url"],
    select,
    textarea {
      background: #111;
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 7px 9px;
      border-radius: 3px;
      outline: none;
      width: 100%;
      transition: border-color 0.12s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green-mid); }
    textarea { resize: vertical; min-height: 68px; line-height: 1.5; }
    select option { background: #111; }

    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    /* Date toggle row */
    .date-header { display: flex; align-items: center; justify-content: space-between; }
    .date-display {
      background: #111;
      border: 1px dashed var(--border2);
      color: var(--muted2);
      font-size: 12px;
      padding: 7px 9px;
      border-radius: 3px;
      font-style: italic;
    }
    .toggle-sm {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted); cursor: pointer; letter-spacing: 0.5px;
    }
    .toggle-sm input[type="checkbox"] { width: 12px; height: 12px; accent-color: var(--green); cursor: pointer; }

    /* Phases */
    .phase-row {
      display: grid;
      grid-template-columns: 1fr 58px 82px 26px;
      gap: 6px;
      align-items: end;
      margin-bottom: 6px;
      padding: 10px 10px 8px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 4px;
      position: relative;
    }
    .phase-idx {
      position: absolute;
      top: -8px; left: 8px;
      background: #0c0c0c;
      color: var(--green);
      font-size: 9px;
      padding: 0 4px;
    }
    .btn-rm {
      background: none;
      border: 1px solid var(--border2);
      color: var(--red);
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      height: 30px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      align-self: end;
    }
    .btn-rm:hover { background: rgba(255,64,64,0.12); border-color: var(--red); }

    .btn-add-phase {
      background: none;
      border: 1px dashed #282828;
      color: var(--muted2);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 6px;
      border-radius: 3px;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
      transition: all 0.12s;
    }
    .btn-add-phase:hover { border-color: var(--green-mid); color: var(--green); background: var(--green-dim); }

    /* Bottom */
    .bottom-bar {
      border-top: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .btn-add-project {
      background: none;
      border: 1px dashed var(--green-mid);
      color: var(--green);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 9px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.12s;
    }
    .btn-add-project:hover { background: var(--green-dim); }

    .opts-row { display: flex; gap: 16px; }
    .toggle-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--muted); cursor: pointer; letter-spacing: 0.5px;
    }
    .toggle-row input { accent-color: var(--green); width: 12px; height: 12px; }

    .act-row { display: flex; gap: 8px; }

    .btn-copy {
      flex: 1;
      background: var(--green);
      color: #000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 11px;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.12s;
    }
    .btn-copy:hover { opacity: 0.85; }

    .btn-reset {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 11px 14px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.12s;
    }
    .btn-reset:hover { border-color: #444; color: var(--text); }

    /* RIGHT PANEL */
    .right-panel {
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .right-panel::-webkit-scrollbar { width: 3px; }
    .right-panel::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .preview-title { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    #preview-rendered {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      font-size: 13px;
      line-height: 1.9;
      flex: 1;
      min-height: 200px;
      color: var(--text);
    }

    /* Preview elements */
    #preview-rendered .hdr { display: inline-block; color: #fff; font-weight: bold; font-size: 15px; }
    #preview-rendered .proj-link { color: var(--green); text-decoration: none; }
    #preview-rendered .proj-link:hover { text-decoration: underline; }
    #preview-rendered b { color: var(--green); }
    #preview-rendered .ts-date {
      background: rgba(88, 101, 242, 0.25);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
      color: #c5cbff;
    }
    #preview-rendered .ts-rel {
      background: rgba(88, 101, 242, 0.15);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
      color: var(--muted2);
    }
    #preview-rendered .ph {
      background: rgba(88,101,242,0.2);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
    }
    #preview-rendered .sep { color: var(--muted); }
    #preview-rendered .lnk { color: var(--blue); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--green);
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 10px 18px;
      border-radius: 3px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.22s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>MINT LIST GENERATOR</h1>
  <span>— Nexus Alpha</span>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="global-bar">
      <span class="flabel">Date globale</span>
      <input type="date" id="global-date" oninput="onGlobalDateChange()" style="max-width:150px;" />
      <span class="global-date-fr" id="global-date-fr"></span>
    </div>

    <div id="projects-container"></div>

    <div class="bottom-bar">
      <button class="btn-add-project" onclick="addProject()">+ Ajouter un projet</button>
      <div class="opts-row">
        <label class="toggle-row">
          <input type="checkbox" id="show-sep" checked onchange="updatePreview()" />
          Séparateurs ---
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="show-bottom" checked onchange="updatePreview()" />
          Pied ------------
        </label>
      </div>
      <div class="act-row">
        <button class="btn-copy" onclick="copyToClipboard()">Copier pour Discord</button>
        <button class="btn-reset" onclick="resetAll()">Reset</button>
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="preview-title">Apercu — Format Discord</div>
    <div id="preview-rendered"></div>
  </div>

</div>

<div class="toast" id="toast">Copié !</div>

<script>
'use strict';

const DAYS_FR   = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const CHAINS    = ['MegaETH','Ethereum','Base','Abstract','Solana','Blast','Arbitrum','Monad','ApeChain','Sui','TON','Linea','Zora'];

let projects = [];
let pid  = 0;
let phid = 0;

/* ── Helpers ── */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shortDate(dateStr) {
  if (!dateStr) return '__/__';
  const [, m, d] = dateStr.split('-');
  return `${d}/${m}`;
}

function formatDateFR(dateStr) {
  if (!dateStr) return '___';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${DAYS_FR[dt.getDay()]} ${d} ${MONTHS_FR[dt.getMonth()]} ${y}`;
}

function toUnix(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const [h, min]  = timeStr.split(':').map(Number);
  return Math.floor(new Date(y, m - 1, d, h, min, 0).getTime() / 1000);
}

function relativeTime(unix) {
  const now  = Math.floor(Date.now() / 1000);
  const diff = unix - now;
  const abs  = Math.abs(diff);
  const past = diff < 0;
  let s;
  if (abs < 60)         s = `${Math.round(abs)} seconde${abs >= 2 ? 's' : ''}`;
  else if (abs < 3600)  { const v = Math.round(abs/60);    s = `${v} minute${v > 1 ? 's' : ''}`; }
  else if (abs < 86400) { const v = Math.round(abs/3600);  s = `${v} heure${v > 1 ? 's' : ''}`;  }
  else                  { const v = Math.round(abs/86400); s = `${v} jour${v > 1 ? 's' : ''}`;   }
  return past ? `il y a ${s}` : `dans ${s}`;
}

/* ── State accessors ── */
function getGlobalDate() { return document.getElementById('global-date').value; }
function projDate(proj)  { return proj.useGlobalDate ? getGlobalDate() : proj.customDate; }

/* ── Project management ── */
function addProject() {
  const id = pid++;
  projects.push({
    id,
    name:          '',
    twitterUrl:    '',
    chain:         'MegaETH',
    price:         '',
    supply:        '',
    useGlobalDate: true,
    customDate:    getGlobalDate(),
    phases: [
      { id: phid++, name: 'GTD',    spots: '', time: '' },
      { id: phid++, name: 'FCFS',   spots: '', time: '' },
      { id: phid++, name: 'Public', spots: '', time: '' },
    ],
    mintLink:    '',
    description: '',
    collapsed:   false,
  });
  renderProjects();
  updatePreview();
}

function removeProject(id) {
  if (projects.length <= 1) return;
  projects = projects.filter(p => p.id !== id);
  renderProjects();
  updatePreview();
}

function toggleCollapse(id) {
  const p = projects.find(p => p.id === id);
  if (p) { p.collapsed = !p.collapsed; renderProjects(); }
}

function setProjField(id, field, value) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  p[field] = value;
  // optimise: update header tag in-place for name changes
  if (field === 'name') {
    const el = document.querySelector(`.proj-name-tag[data-pid="${id}"]`);
    if (el) el.textContent = value || 'Sans nom';
  }
  updatePreview();
}

function toggleGlobalDate(id, checked) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  p.useGlobalDate = checked;
  // only re-render the body of this project
  renderProjectBody(id);
  updatePreview();
}

/* ── Phase management ── */
function addPhase(projId) {
  const p = projects.find(p => p.id === projId);
  if (!p) return;
  p.phases.push({ id: phid++, name: '', spots: '', time: '' });
  renderProjectBody(projId);
  updatePreview();
}

function removePhase(projId, phaseId) {
  const p = projects.find(p => p.id === projId);
  if (!p || p.phases.length <= 1) return;
  p.phases = p.phases.filter(ph => ph.id !== phaseId);
  renderProjectBody(projId);
  updatePreview();
}

function setPhaseField(projId, phaseId, field, value) {
  const p  = projects.find(p  => p.id  === projId);
  if (!p) return;
  const ph = p.phases.find(ph => ph.id === phaseId);
  if (!ph) return;
  ph[field] = value;
  updatePreview();
}

/* ── Global date change ── */
function onGlobalDateChange() {
  const v = getGlobalDate();
  document.getElementById('global-date-fr').textContent = v ? formatDateFR(v) : '';
  // update date-display placeholders for projects using global date
  document.querySelectorAll('.date-display[data-pid]').forEach(el => {
    const id = parseInt(el.dataset.pid);
    const p = projects.find(p => p.id === id);
    if (p && p.useGlobalDate) el.textContent = v ? formatDateFR(v) : 'Sélectionner une date globale';
  });
  updatePreview();
}

/* ── Render ── */
function renderProjects() {
  const container = document.getElementById('projects-container');
  container.innerHTML = '';
  projects.forEach((proj, idx) => container.appendChild(createProjectCard(proj, idx)));
}

function createProjectCard(proj, idx) {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.dataset.pid = proj.id;

  const header = document.createElement('div');
  header.className = 'project-header';
  header.onclick = () => toggleCollapse(proj.id);
  header.innerHTML = `
    <div class="ph-left">
      <span class="proj-num">PROJET ${idx + 1}</span>
      <span class="proj-name-tag" data-pid="${proj.id}">${esc(proj.name) || 'Sans nom'}</span>
    </div>
    <div class="ph-right">
      <span class="caret">${proj.collapsed ? '▼' : '▲'}</span>
      ${projects.length > 1
        ? `<button class="btn-del-proj" onclick="event.stopPropagation();removeProject(${proj.id})">×</button>`
        : ''}
    </div>
  `;
  card.appendChild(header);

  if (!proj.collapsed) {
    const body = document.createElement('div');
    body.className = 'project-body';
    body.id = `proj-body-${proj.id}`;
    body.innerHTML = buildBodyHTML(proj);
    card.appendChild(body);
  }
  return card;
}

function renderProjectBody(projId) {
  const p    = projects.find(p => p.id === projId);
  const body = document.getElementById(`proj-body-${projId}`);
  if (p && body) body.innerHTML = buildBodyHTML(p);
}

function buildBodyHTML(proj) {
  const d = projDate(proj);
  const chainOpts = CHAINS.map(c => `<option${proj.chain === c ? ' selected' : ''}>${c}</option>`).join('');

  const phasesHTML = proj.phases.map((ph, i) => `
    <div class="phase-row">
      <span class="phase-idx">P${i + 1}</span>
      <div class="field">
        <span class="flabel">Nom</span>
        <input type="text" value="${esc(ph.name)}" placeholder="GTD / FCFS / Public"
          oninput="setPhaseField(${proj.id},${ph.id},'name',this.value)" />
      </div>
      <div class="field">
        <span class="flabel">Spots</span>
        <input type="text" value="${esc(ph.spots)}" placeholder="2"
          oninput="setPhaseField(${proj.id},${ph.id},'spots',this.value)" />
      </div>
      <div class="field">
        <span class="flabel">Heure</span>
        <input type="time" value="${esc(ph.time)}"
          oninput="setPhaseField(${proj.id},${ph.id},'time',this.value)" />
      </div>
      <button class="btn-rm" onclick="removePhase(${proj.id},${ph.id})">×</button>
    </div>
  `).join('');

  return `
    <div class="g2">
      <div class="field">
        <span class="flabel">Nom du projet</span>
        <input type="text" value="${esc(proj.name)}" placeholder="MINIMINDS"
          oninput="setProjField(${proj.id},'name',this.value)" />
      </div>
      <div class="field">
        <span class="flabel">Chain</span>
        <select onchange="setProjField(${proj.id},'chain',this.value)">${chainOpts}</select>
      </div>
    </div>

    <div class="field">
      <span class="flabel">Twitter / X URL</span>
      <input type="url" value="${esc(proj.twitterUrl)}" placeholder="https://x.com/projecthandle"
        oninput="setProjField(${proj.id},'twitterUrl',this.value)" />
    </div>

    <div class="g2">
      <div class="field">
        <span class="flabel">Price</span>
        <input type="text" value="${esc(proj.price)}" placeholder="0.017"
          oninput="setProjField(${proj.id},'price',this.value)" />
      </div>
      <div class="field">
        <span class="flabel">Supply</span>
        <input type="text" value="${esc(proj.supply)}" placeholder="3,333"
          oninput="setProjField(${proj.id},'supply',this.value)" />
      </div>
    </div>

    <div class="field">
      <div class="date-header" style="margin-bottom:4px;">
        <span class="flabel">Date du mint</span>
        <label class="toggle-sm">
          <input type="checkbox" ${proj.useGlobalDate ? 'checked' : ''}
            onchange="toggleGlobalDate(${proj.id},this.checked)" />
          Date globale
        </label>
      </div>
      ${proj.useGlobalDate
        ? `<div class="date-display" data-pid="${proj.id}">${d ? formatDateFR(d) : 'Sélectionner une date globale'}</div>`
        : `<input type="date" value="${esc(proj.customDate)}"
            oninput="setProjField(${proj.id},'customDate',this.value)" />`
      }
    </div>

    <div>
      <div style="margin-bottom:6px;"><span class="flabel">Phases de mint</span></div>
      ${phasesHTML}
      <button class="btn-add-phase" onclick="addPhase(${proj.id})">+ Ajouter une phase</button>
    </div>

    <div class="field">
      <span class="flabel">Lien mint (optionnel)</span>
      <input type="url" value="${esc(proj.mintLink)}" placeholder="https://..."
        oninput="setProjField(${proj.id},'mintLink',this.value)" />
    </div>

    <div class="field">
      <span class="flabel">Alpha / Description</span>
      <textarea oninput="setProjField(${proj.id},'description',this.value)">${esc(proj.description)}</textarea>
    </div>
  `;
}

/* ── Output: Discord text ── */
function buildText() {
  const showSep    = document.getElementById('show-sep').checked;
  const showBottom = document.getElementById('show-bottom').checked;
  const firstDate  = projects.length > 0 ? projDate(projects[0]) : getGlobalDate();

  const lines = [`**${shortDate(firstDate)}**`];

  projects.forEach((proj, idx) => {
    const date = projDate(proj);
    lines.push('');

    // Project name: markdown hyperlink if twitter URL provided
    const name    = proj.name || '___';
    const nameStr = proj.twitterUrl ? `[${name}](${proj.twitterUrl})` : name;
    lines.push(`Projet : ${nameStr}`);
    lines.push(`Chain : ${proj.chain}`);
    if (proj.price)  lines.push(`Price : ${proj.price}`);
    if (proj.supply) lines.push(`Supply : ${proj.supply}`);
    lines.push('');

    // Phases with Discord timestamps
    proj.phases.forEach(ph => {
      const phName = ph.name || '___';
      const spots  = ph.spots ? ` (${ph.spots} spots)` : '';
      const unix   = toUnix(date, ph.time);
      if (unix) {
        lines.push(`${phName}${spots} : <t:${unix}:F> <t:${unix}:R>`);
      } else {
        lines.push(`${phName}${spots} : ${formatDateFR(date)} à ${ph.time || '__:__'}`);
      }
    });

    if (proj.mintLink) {
      lines.push('');
      lines.push(`Mint page : ${proj.mintLink}`);
    }

    if (proj.description) {
      lines.push('');
      if (showSep) lines.push('---');
      lines.push('');
      lines.push(proj.description);
    }

    if (idx < projects.length - 1) {
      lines.push('');
      lines.push('---');
    }
  });

  if (showBottom) {
    lines.push('');
    lines.push('------------');
  }

  return lines.join('\n');
}

/* ── Output: Preview HTML ── */
function buildPreviewHTML() {
  const showSep    = document.getElementById('show-sep').checked;
  const showBottom = document.getElementById('show-bottom').checked;
  const firstDate  = projects.length > 0 ? projDate(projects[0]) : getGlobalDate();

  let html = `<span class="hdr">${esc(shortDate(firstDate))}</span><br>`;

  projects.forEach((proj, idx) => {
    const date = projDate(proj);
    html += `<br>`;

    const name    = proj.name || '___';
    const nameHTML = proj.twitterUrl
      ? `<a class="proj-link" href="${esc(proj.twitterUrl)}" target="_blank">${esc(name)}</a>`
      : `<b>${esc(name)}</b>`;

    html += `Projet : ${nameHTML}<br>`;
    html += `Chain : ${esc(proj.chain)}<br>`;
    if (proj.price)  html += `Price : ${esc(proj.price)}<br>`;
    if (proj.supply) html += `Supply : ${esc(proj.supply)}<br>`;
    html += `<br>`;

    proj.phases.forEach(ph => {
      const phName = esc(ph.name || '___');
      const spots  = ph.spots ? ` (${ph.spots} spots)` : '';
      const unix   = toUnix(date, ph.time);
      const dateFR = formatDateFR(date);
      const time   = ph.time || '__:__';

      if (unix) {
        const rel = relativeTime(unix);
        html += `${phName}${spots} : <span class="ts-date">📅 ${esc(dateFR)} à ${time}</span> <span class="ts-rel">⏳ ${esc(rel)}</span><br>`;
      } else {
        html += `${phName}${spots} : <span class="ph">${esc(dateFR)} à ${time}</span><br>`;
      }
    });

    if (proj.mintLink) {
      html += `<br>Mint page : <span class="lnk">${esc(proj.mintLink)}</span><br>`;
    }

    if (proj.description) {
      html += `<br>`;
      if (showSep) html += `<span class="sep">---</span><br><br>`;
      html += `${esc(proj.description).replace(/\n/g,'<br>')}<br>`;
    }

    if (idx < projects.length - 1) {
      html += `<br><span class="sep">---</span><br>`;
    }
  });

  if (showBottom) {
    html += `<br><span class="sep">------------</span><br>`;
  }

  return html;
}

function updatePreview() {
  document.getElementById('preview-rendered').innerHTML = buildPreviewHTML();
}

/* ── Actions ── */
function copyToClipboard() {
  const text = buildText();
  navigator.clipboard.writeText(text).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function resetAll() {
  projects = [];
  pid = phid = 0;
  const today = todayStr();
  document.getElementById('global-date').value = today;
  document.getElementById('global-date-fr').textContent = formatDateFR(today);
  addProject();
}
